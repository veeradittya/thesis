# Cloudflare Tunnel config for anton.
# Place on anton at ~/.cloudflared/config.yml (NOT in the repo dir).
# Replace <UUID> with the id printed by `cloudflared tunnel create betathesis`
# (credentials land at ~/.cloudflared/<UUID>.json).

tunnel: betathesis
credentials-file: /home/veer/.cloudflared/<UUID>.json

ingress:
  - hostname: betathesis.com
    service: http://localhost:3000
  - hostname: www.betathesis.com
    service: http://localhost:3000
  - service: http_status:404
